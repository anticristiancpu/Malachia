<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Malachia — Dettaglio libro (handoff preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=UnifrakturCook:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  @font-face {
    font-family: 'Agmena Pro';
    src: url('fonts/AgmenaPro-Regular.ttf') format('truetype');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Agmena Pro', Georgia, serif;
    background: #0a0704;
    color: #e8dcc0;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .m-nums { font-variant-numeric: tabular-nums lining-nums; }

  /* Stage scales the 1280x880 artboard into the viewport, letterboxed. */
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #artboard {
    width: 1280px; height: 880px;
    transform-origin: center center;
    box-shadow: 0 30px 90px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="artboard">
    <div id="root" style="width:100%;height:100%"></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="screens-cinematic.jsx"></script>
<script type="text/babel" src="screens-cinematic-4.jsx"></script>
<script type="text/babel">
function App() {
  return <CineBookDetail/>;
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

// Scale the artboard to fit the viewport
function fit() {
  const a = document.getElementById('artboard');
  if (!a) return;
  const sx = window.innerWidth  / 1280;
  const sy = window.innerHeight / 880;
  const s = Math.min(sx, sy);
  a.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fit);
fit();
</script>
</body>
</html>
