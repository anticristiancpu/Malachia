<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Malachia · Libreria · filter-bar redesign (handoff preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
  @font-face {
    font-family: 'Agmena Pro';
    src: url('fonts/AgmenaPro-Regular.ttf') format('truetype');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Agmena Pro', Georgia, serif;
    background: #000;
    color: #e8dcc0;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  * { scrollbar-width: thin; scrollbar-color: rgba(216,180,106,0.4) transparent; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
  #artboard { width: 1280px; height: 880px; transform-origin: center center; box-shadow: 0 30px 90px rgba(0,0,0,0.6); position: relative; overflow: hidden; }
</style>
</head>
<body>
<div id="stage"><div id="artboard"><div id="root" style="width:100%;height:100%"></div></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="libreria.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<LibreriaPage/>);

  function fit() {
    const a = document.getElementById('artboard');
    if (!a) return;
    const s = Math.min(window.innerWidth / 1280, window.innerHeight / 880);
    a.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();
</script>
</body>
</html>
