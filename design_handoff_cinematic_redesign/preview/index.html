<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Malachia — ridisegno cinematografico</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,600&family=UnifrakturCook:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  @font-face {
    font-family: 'Mantinia';
    src: url('fonts/Mantinia-Regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Agmena Pro';
    src: url('fonts/AgmenaPro-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Agmena Pro', Georgia, serif;
    background: #14100a;
    color: #e8dcc0;
    -webkit-font-smoothing: antialiased;
  }
  .m-nums { font-variant-numeric: tabular-nums lining-nums; }
  * { scrollbar-width: thin; scrollbar-color: rgba(216,180,106,0.4) transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens-cinematic.jsx"></script>
<script type="text/babel" src="screens-cinematic-2.jsx"></script>
<script type="text/babel" src="screens-cinematic-3.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="cinematic" title="Malachia · ridisegno cinematografico" subtitle="App rivisitata in chiave game-UI: fondo atmosferico, tab-bar superiore, crest araldico, font Cinzel + Fraunces. Una sola foto di sfondo (drop-once) si applica a tutte le schermate.">
        <DCArtboard id="web-dashboard-cinematic" label="Studio · home screen" width={1280} height={880}><WebDashboardCinematic/></DCArtboard>
        <DCArtboard id="cine-libreria" label="Libreria · griglia" width={1280} height={880}><CineLibreria/></DCArtboard>
        <DCArtboard id="cine-autori" label="Autori · A–Z + dettaglio" width={1280} height={880}><CineAutori/></DCArtboard>
        <DCArtboard id="cine-editori" label="Editori · collane" width={1280} height={880}><CineEditori/></DCArtboard>
        <DCArtboard id="cine-scaffali" label="Scaffali · collezioni" width={1280} height={880}><CineScaffali/></DCArtboard>
        <DCArtboard id="cine-tolkien" label="Collezione Tolkien" width={1280} height={880}><CineCollezioneTolkien/></DCArtboard>
        <DCArtboard id="cine-desiderata" label="Desiderata" width={1280} height={880}><CineDesiderata/></DCArtboard>
        <DCArtboard id="cine-annales" label="Annales · statistiche" width={1280} height={880}><CineAnnales/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
